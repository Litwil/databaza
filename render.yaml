databases:
  - name: databaza-db
    databaseName: databaza
    user: databaza
    plan: free

services:
  - type: web
    name: databaza
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: databaza-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
