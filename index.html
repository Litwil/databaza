<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Študenti</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a1d2e 0%, #16213e 100%);
            border-bottom: 1px solid #2d3748;
            padding: 28px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #f7fafc;
        }

        header h1 span { color: #667eea; }

        .load-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .load-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .load-btn:active { transform: translateY(0); }

        main {
            padding: 20px 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .status {
            text-align: center;
            color: #718096;
            font-size: 0.95rem;
            padding: 60px 0;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }

        .card {
            background: #1a1d2e;
            border: 1px solid #2d3748;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #667eea;
        }

        .card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
        }

        .card-body {
            padding: 8px 10px 10px;
        }

        .card-body h3 {
            font-size: 0.78rem;
            font-weight: 600;
            color: #f7fafc;
            margin-bottom: 4px;
        }

        .badge {
            display: inline-block;
            padding: 2px 7px;
            background: rgba(102, 126, 234, 0.15);
            color: #a78bfa;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 500;
        }

        /* Modal overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        /* Chat modal */
        .chat-modal {
            background: #1a1d2e;
            border: 1px solid #2d3748;
            border-radius: 20px;
            width: 480px;
            max-width: 95vw;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2d3748;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-info h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #f7fafc;
        }

        .chat-header-info span {
            font-size: 0.75rem;
            color: #a78bfa;
        }

        .chat-close {
            margin-left: auto;
            background: none;
            border: none;
            color: #718096;
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
        }

        .chat-close:hover { color: #f7fafc; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 4px; }

        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .msg.user {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg.bot {
            background: #252840;
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg.typing {
            color: #718096;
            font-style: italic;
        }

        .chat-input-row {
            padding: 14px 16px;
            border-top: 1px solid #2d3748;
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            background: #0f1117;
            border: 1px solid #2d3748;
            border-radius: 10px;
            padding: 10px 14px;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus { border-color: #667eea; }

        .send-btn {
            padding: 10px 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .send-btn:hover { opacity: 0.9; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>

<body>

<header>
    <h1>Zoznam <span>študentov</span></h1>
    <button class="load-btn" onclick="loadStudents()">Načítať študentov</button>
</header>

<main>
    <div id="students" class="container"><p class="status">Klikni na tlačidlo pre načítanie študentov.</p></div>
</main>

<!-- Chat modal -->
<div class="modal-overlay" id="modal" onclick="closeOnOverlay(event)">
    <div class="chat-modal">
        <div class="chat-header">
            <img id="chat-avatar" src="" alt="">
            <div class="chat-header-info">
                <h2 id="chat-name"></h2>
                <span id="chat-nickname"></span>
            </div>
            <button class="chat-close" onclick="closeChat()">✕</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-row">
            <input class="chat-input" id="chat-input" type="text" placeholder="Napíš správu..." onkeydown="handleKey(event)">
            <button class="send-btn" id="send-btn" onclick="sendMessage()">Odoslať</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://localhost:5000/api";

    let currentStudentId = null;
    let messageHistory = [];

    async function loadStudents() {
        const container = document.getElementById("students");
        container.innerHTML = "Načítavam...";

        try {
            const response = await fetch(API_URL);
            const data = await response.json();

            container.innerHTML = "";

            data.students.forEach(student => {
                const div = document.createElement("div");
                div.className = "card";
                div.onclick = () => openChat(student);

                const nickname = student.nickname && student.nickname.trim()
                    ? `<span class="badge">${student.nickname}</span>`
                    : "";

                div.innerHTML = `
                    <img src="${student.image}" alt="${student.name}">
                    <div class="card-body">
                        <h3>${student.name} ${student.surname}</h3>
                        ${nickname}
                    </div>
                `;

                container.appendChild(div);
            });

        } catch (error) {
            container.innerHTML = "❌ Nepodarilo sa načítať dáta";
            console.error(error);
        }
    }

    function openChat(student) {
        currentStudentId = student.id;
        messageHistory = [];

        document.getElementById("chat-avatar").src = student.image;
        document.getElementById("chat-name").textContent = `${student.name} ${student.surname}`;
        document.getElementById("chat-nickname").textContent = student.nickname?.trim() ? `"${student.nickname}"` : "";
        document.getElementById("chat-messages").innerHTML = "";
        document.getElementById("modal").classList.add("open");
        document.getElementById("chat-input").focus();

        addMessage("bot", `Ahoj! Som ${student.name}. Čo chceš vedieť?`);
    }

    function closeChat() {
        document.getElementById("modal").classList.remove("open");
        currentStudentId = null;
        messageHistory = [];
    }

    function closeOnOverlay(e) {
        if (e.target === document.getElementById("modal")) closeChat();
    }

    function addMessage(role, text) {
        const container = document.getElementById("chat-messages");
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        div.textContent = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    function handleKey(e) {
        if (e.key === "Enter") sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById("chat-input");
        const sendBtn = document.getElementById("send-btn");
        const text = input.value.trim();
        if (!text || !currentStudentId) return;

        input.value = "";
        addMessage("user", text);
        messageHistory.push({ role: "user", content: text });

        sendBtn.disabled = true;
        const typingDiv = addMessage("bot typing", "píše...");

        try {
            const res = await fetch(`${API_URL}/chat/${currentStudentId}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: messageHistory })
            });

            const data = await res.json();
            typingDiv.remove();

            addMessage("bot", data.reply);
            messageHistory.push({ role: "assistant", content: data.reply });

        } catch (err) {
            typingDiv.textContent = "❌ Chyba spojenia";
            typingDiv.classList.remove("typing");
        }

        sendBtn.disabled = false;
        input.focus();
    }
</script>

</body>
</html>
