<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a1d2e 0%, #16213e 100%);
            border-bottom: 1px solid #2d3748;
            padding: 28px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #f7fafc;
        }

        header h1 span { color: #667eea; }

        .load-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .load-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .load-btn:active { transform: translateY(0); }

        main {
            padding: 20px 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .status {
            text-align: center;
            color: #718096;
            font-size: 0.95rem;
            padding: 60px 0;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }

        .card {
            background: #1a1d2e;
            border: 1px solid #2d3748;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #667eea;
        }

        .card:hover .edit-btn {
            opacity: 1;
        }

        .card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            cursor: pointer;
        }

        .card-body {
            padding: 8px 10px 10px;
            cursor: pointer;
        }

        .card-body h3 {
            font-size: 0.78rem;
            font-weight: 600;
            color: #f7fafc;
            margin-bottom: 4px;
        }

        .badge {
            display: inline-block;
            padding: 2px 7px;
            background: rgba(102, 126, 234, 0.15);
            color: #a78bfa;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 500;
        }

        .edit-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 26px;
            height: 26px;
            border-radius: 8px;
            background: rgba(15, 17, 23, 0.85);
            border: 1px solid #2d3748;
            color: #a78bfa;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
            z-index: 1;
        }

        .edit-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* Modal overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        /* Chat modal */
        .chat-modal {
            background: #1a1d2e;
            border: 1px solid #2d3748;
            border-radius: 20px;
            width: 480px;
            max-width: 95vw;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2d3748;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-info h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #f7fafc;
        }

        .chat-header-info span {
            font-size: 0.75rem;
            color: #a78bfa;
        }

        .chat-close {
            margin-left: auto;
            background: none;
            border: none;
            color: #718096;
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
        }

        .chat-close:hover { color: #f7fafc; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 4px; }

        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .msg.user {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg.bot {
            background: #252840;
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg.typing {
            color: #718096;
            font-style: italic;
        }

        .chat-input-row {
            padding: 14px 16px;
            border-top: 1px solid #2d3748;
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            background: #0f1117;
            border: 1px solid #2d3748;
            border-radius: 10px;
            padding: 10px 14px;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus { border-color: #667eea; }

        .send-btn {
            padding: 10px 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .send-btn:hover { opacity: 0.9; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Edit modal */
        .edit-modal {
            background: #1a1d2e;
            border: 1px solid #2d3748;
            border-radius: 20px;
            width: 480px;
            max-width: 95vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .edit-modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2d3748;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .edit-modal-header h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #f7fafc;
        }

        .edit-modal-body {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.78rem;
            font-weight: 600;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input,
        .form-group textarea {
            background: #0f1117;
            border: 1px solid #2d3748;
            border-radius: 10px;
            padding: 10px 14px;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        .form-group input:focus,
        .form-group textarea:focus { border-color: #667eea; }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .edit-modal-footer {
            padding: 14px 20px;
            border-top: 1px solid #2d3748;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn-cancel {
            padding: 10px 18px;
            background: transparent;
            border: 1px solid #2d3748;
            border-radius: 10px;
            color: #718096;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-cancel:hover { border-color: #718096; color: #e2e8f0; }

        .btn-save {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-save:hover { opacity: 0.9; }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

        .save-feedback {
            font-size: 0.8rem;
            padding: 6px 0;
            color: #68d391;
            align-self: center;
            display: none;
        }

        .sort-bar {
            display: none;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .sort-bar.visible { display: flex; }

        .sort-label {
            font-size: 0.78rem;
            color: #718096;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-right: 4px;
        }

        .sort-btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid #2d3748;
            background: transparent;
            color: #a0aec0;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .sort-btn:hover { border-color: #667eea; color: #e2e8f0; }

        .sort-btn.active {
            background: rgba(102, 126, 234, 0.15);
            border-color: #667eea;
            color: #a78bfa;
        }

        .sort-arrow { font-size: 0.7rem; }

        /* Cookie banner */
        .cookie-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1d2e;
            border-top: 1px solid #2d3748;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            z-index: 999;
            flex-wrap: wrap;
        }

        .cookie-banner.hidden { display: none; }

        .cookie-banner p {
            font-size: 0.85rem;
            color: #a0aec0;
            margin: 0;
        }

        .cookie-banner p a {
            color: #a78bfa;
            text-decoration: underline;
        }

        .cookie-actions { display: flex; gap: 8px; flex-shrink: 0; }

        .btn-decline {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #2d3748;
            background: transparent;
            color: #718096;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-decline:hover { border-color: #718096; color: #e2e8f0; }

        .btn-accept {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-accept:hover { opacity: 0.9; }
    </style>
</head>

<body>

<header>
    <h1>List of <span>students</span></h1>
    <button class="load-btn" onclick="loadStudents()">Load students</button>
</header>

<main>
    <div class="sort-bar" id="sort-bar">
        <span class="sort-label">Sort by:</span>
        <button class="sort-btn" onclick="applySort('name')">First name <span class="sort-arrow" id="arrow-name"></span></button>
        <button class="sort-btn" onclick="applySort('surname')">Last name <span class="sort-arrow" id="arrow-surname"></span></button>
        <button class="sort-btn" onclick="applySort('age')">Age <span class="sort-arrow" id="arrow-age"></span></button>
        <button class="sort-btn" onclick="applySort('height')">Height <span class="sort-arrow" id="arrow-height"></span></button>
    </div>
    <div id="students" class="container"><p class="status">Click the button to load students.</p></div>
</main>

<!-- Cookie banner -->
<div class="cookie-banner" id="cookie-banner">
    <p>🍪 We use cookies to remember your sort preference. By clicking <strong>Accept</strong>, you agree to our use of cookies.</p>
    <div class="cookie-actions">
        <button class="btn-decline" onclick="declineCookies()">Decline</button>
        <button class="btn-accept" onclick="acceptCookies()">Accept</button>
    </div>
</div>

<!-- Chat modal -->
<div class="modal-overlay" id="modal" onclick="closeOnOverlay(event)">
    <div class="chat-modal">
        <div class="chat-header">
            <img id="chat-avatar" src="" alt="">
            <div class="chat-header-info">
                <h2 id="chat-name"></h2>
                <span id="chat-nickname"></span>
            </div>
            <button class="chat-close" onclick="closeChat()">✕</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-row">
            <input class="chat-input" id="chat-input" type="text" placeholder="Type a message..." onkeydown="handleKey(event)">
            <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="edit-modal" onclick="closeEditOnOverlay(event)">
    <div class="edit-modal">
        <div class="edit-modal-header">
            <h2>Edit student</h2>
            <button class="chat-close" onclick="closeEdit()">✕</button>
        </div>
        <div class="edit-modal-body">
            <div class="form-group">
                <label>First name</label>
                <input type="text" id="edit-name" placeholder="First name">
            </div>
            <div class="form-group">
                <label>Last name</label>
                <input type="text" id="edit-surname" placeholder="Last name">
            </div>
            <div class="form-group">
                <label>Nickname</label>
                <input type="text" id="edit-nickname" placeholder="Nickname (optional)">
            </div>
            <div class="form-group">
                <label>Character (AI prompt)</label>
                <textarea id="edit-character" placeholder="Character description for AI..."></textarea>
            </div>
        </div>
        <div class="edit-modal-footer">
            <span class="save-feedback" id="save-feedback">Saved!</span>
            <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
            <button class="btn-save" id="save-btn" onclick="saveStudent()">Save</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://databaza-2.onrender.com/api";

    let currentStudentId = null;
    let messageHistory = [];
    let editStudentData = null;
    let allStudents = [];
    let sortKey = getCookie("sortKey") || null;
    let sortAsc = getCookie("sortAsc") !== "false";

    // --- Cookies ---
    function setCookie(name, value) {
        if (getCookie("cookieConsent") !== "accepted") return;
        document.cookie = `${name}=${value};path=/;max-age=${60 * 60 * 24 * 365}`;
    }

    function getCookie(name) {
        const match = document.cookie.split("; ").find(c => c.startsWith(name + "="));
        return match ? match.split("=")[1] : null;
    }

    function acceptCookies() {
        document.cookie = "cookieConsent=accepted;path=/;max-age=" + (60 * 60 * 24 * 365);
        document.getElementById("cookie-banner").classList.add("hidden");
    }

    function declineCookies() {
        document.cookie = "cookieConsent=declined;path=/;max-age=" + (60 * 60 * 24 * 365);
        document.getElementById("cookie-banner").classList.add("hidden");
    }

    // Show banner only if user hasn't decided yet
    if (getCookie("cookieConsent")) {
        document.getElementById("cookie-banner").classList.add("hidden");
    }

    // --- Quicksort (no Array.sort) ---
    function quickSort(arr, key, asc) {
        if (arr.length <= 1) return arr;
        const pivotIdx = Math.floor(arr.length / 2);
        const pivot = arr[pivotIdx][key];
        const left = [], middle = [], right = [];
        for (let i = 0; i < arr.length; i++) {
            const val = arr[i][key];
            let cmp;
            if (typeof val === "string") {
                cmp = val.localeCompare(pivot, "sk");
            } else {
                cmp = val < pivot ? -1 : val > pivot ? 1 : 0;
            }
            if (cmp < 0) left.push(arr[i]);
            else if (cmp > 0) right.push(arr[i]);
            else middle.push(arr[i]);
        }
        const sorted = [...quickSort(left, key, asc), ...middle, ...quickSort(right, key, asc)];
        if (!asc) sorted.reverse();
        return sorted;
    }

    function applySort(key) {
        if (sortKey === key) {
            sortAsc = !sortAsc;
        } else {
            sortKey = key;
            sortAsc = true;
        }
        setCookie("sortKey", sortKey);
        setCookie("sortAsc", sortAsc);
        updateSortUI();
        renderStudents(quickSort(allStudents, sortKey, sortAsc));
    }

    function updateSortUI() {
        document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".sort-arrow").forEach(a => a.textContent = "");
        if (!sortKey) return;
        const btn = document.querySelector(`[onclick="applySort('${sortKey}')"]`);
        if (btn) btn.classList.add("active");
        const arrow = document.getElementById(`arrow-${sortKey}`);
        if (arrow) arrow.textContent = sortAsc ? "▲" : "▼";
    }

    function renderStudents(students) {
        const container = document.getElementById("students");
        container.innerHTML = "";
        students.forEach(student => {
            const card = document.createElement("div");
            card.className = "card";
            card.id = `card-${student.id}`;

            const nickname = student.nickname && student.nickname.trim()
                ? `<span class="badge">${student.nickname}</span>`
                : "";
            const meta = `<span style="font-size:0.68rem;color:#718096">${student.age} r. · ${student.height} cm</span>`;

            card.innerHTML = `
                <button class="edit-btn" title="Edit" onclick="openEdit(event, ${student.id})">✎</button>
                <img src="${student.image}" alt="${student.name}" onclick="openChatFromCard(${student.id})">
                <div class="card-body" onclick="openChatFromCard(${student.id})">
                    <h3>${student.name} ${student.surname}</h3>
                    ${nickname}
                    ${meta}
                </div>
            `;

            card.dataset.student = JSON.stringify(student);
            container.appendChild(card);
        });
    }

    async function loadStudents() {
        const container = document.getElementById("students");
        container.innerHTML = "Loading...";

        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            allStudents = data.students;
            document.getElementById("sort-bar").classList.add("visible");
            updateSortUI();
            const toRender = sortKey ? quickSort(allStudents, sortKey, sortAsc) : allStudents;
            renderStudents(toRender);
        } catch (error) {
            container.innerHTML = "❌ Failed to load data";
            console.error(error);
        }
    }

    function getStudentFromCard(id) {
        const card = document.getElementById(`card-${id}`);
        return card ? JSON.parse(card.dataset.student) : null;
    }

    function openChatFromCard(id) {
        const student = getStudentFromCard(id);
        if (student) openChat(student);
    }

    function openChat(student) {
        if (typeof student === 'string') student = JSON.parse(student);
        currentStudentId = student.id;
        messageHistory = [];

        document.getElementById("chat-avatar").src = student.image;
        document.getElementById("chat-name").textContent = `${student.name} ${student.surname}`;
        document.getElementById("chat-nickname").textContent = student.nickname?.trim() ? `"${student.nickname}"` : "";
        document.getElementById("chat-messages").innerHTML = "";
        document.getElementById("modal").classList.add("open");
        document.getElementById("chat-input").focus();

        addMessage("bot", `Ahoj! Som ${student.name}. Čo chceš vedieť?`);
    }

    function closeChat() {
        document.getElementById("modal").classList.remove("open");
        currentStudentId = null;
        messageHistory = [];
    }

    function closeOnOverlay(e) {
        if (e.target === document.getElementById("modal")) closeChat();
    }

    function addMessage(role, text) {
        const container = document.getElementById("chat-messages");
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        div.textContent = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    function handleKey(e) {
        if (e.key === "Enter") sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById("chat-input");
        const sendBtn = document.getElementById("send-btn");
        const text = input.value.trim();
        if (!text || !currentStudentId) return;

        input.value = "";
        addMessage("user", text);
        messageHistory.push({ role: "user", content: text });

        sendBtn.disabled = true;
        const typingDiv = addMessage("bot typing", "typing...");

        try {
            const res = await fetch(`${API_URL}/chat/${currentStudentId}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: messageHistory })
            });

            const data = await res.json();
            typingDiv.remove();

            addMessage("bot", data.reply);
            messageHistory.push({ role: "assistant", content: data.reply });

        } catch (err) {
            typingDiv.textContent = "❌ Chyba spojenia";
            typingDiv.classList.remove("typing");
        }

        sendBtn.disabled = false;
        input.focus();
    }

    /* ---- Edit functionality ---- */

    function openEdit(event, id) {
        event.stopPropagation();
        const student = getStudentFromCard(id);
        if (!student) return;

        editStudentData = { ...student };

        document.getElementById("edit-name").value = student.name;
        document.getElementById("edit-surname").value = student.surname;
        document.getElementById("edit-nickname").value = student.nickname || "";
        document.getElementById("edit-character").value = student.character || "";
        document.getElementById("save-feedback").style.display = "none";
        document.getElementById("save-btn").disabled = false;
        document.getElementById("edit-modal").classList.add("open");
    }

    function closeEdit() {
        document.getElementById("edit-modal").classList.remove("open");
        editStudentData = null;
    }

    function closeEditOnOverlay(e) {
        if (e.target === document.getElementById("edit-modal")) closeEdit();
    }

    async function saveStudent() {
        if (!editStudentData) return;

        const saveBtn = document.getElementById("save-btn");
        saveBtn.disabled = true;

        const updated = {
            name: document.getElementById("edit-name").value.trim(),
            surname: document.getElementById("edit-surname").value.trim(),
            nickname: document.getElementById("edit-nickname").value.trim(),
            image: editStudentData.image,
            character: document.getElementById("edit-character").value.trim(),
        };

        try {
            const res = await fetch(`${API_URL}/student/${editStudentData.id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(updated)
            });

            if (!res.ok) throw new Error("Server error");

            const saved = await res.json();

            // Update card in DOM and allStudents array
            const idx = allStudents.findIndex(s => s.id === editStudentData.id);
            if (idx !== -1) allStudents[idx] = { ...allStudents[idx], ...saved };
            const card = document.getElementById(`card-${editStudentData.id}`);
            if (card) {
                card.dataset.student = JSON.stringify(allStudents[idx]);
                const nickname = saved.nickname && saved.nickname.trim()
                    ? `<span class="badge">${saved.nickname}</span>`
                    : "";
                const meta = `<span style="font-size:0.68rem;color:#718096">${allStudents[idx].age} r. · ${allStudents[idx].height} cm</span>`;
                card.querySelector(".card-body").innerHTML = `
                    <h3>${saved.name} ${saved.surname}</h3>
                    ${nickname}
                    ${meta}
                `;
            }

            const feedback = document.getElementById("save-feedback");
            feedback.style.display = "block";
            setTimeout(() => closeEdit(), 1000);

        } catch (err) {
            console.error(err);
            alert("❌ Failed to save changes");
            saveBtn.disabled = false;
        }
    }
</script>

</body>
</html>
